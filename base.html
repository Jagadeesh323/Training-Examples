<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Mail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 24px;
            margin-top: 120px;
        }

        .logo {
            font-size: 22px;
            margin-bottom: 30px;
            font-family: serif;
        }

        .tabs {
            display: flex;
            background: #ececef;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            color: #555;
            border-radius: 10px;
            font-size: 18px;
        }

        .tab.active {
            background: white;
            color: black;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            font-weight: 600;
        }

        label {
            display: block;
            margin: 18px 0 8px;
            color: #333;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: #ececef;
            font-size: 16px;
        }

        .forgot {
            display: block;
            text-align: right;
            margin: 14px 0 20px;
            color: #1565c0;
            text-decoration: none;
            font-size: 15px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            font-size: 18px;
            margin-top: 10px;
            cursor: pointer;
        }

        .divider {
            text-align: center;
            margin: 28px 0 18px;
            color: #666;
        }

        .social {
            display: flex;
            gap: 14px;
        }

        .social button {
            flex: 1;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">✧ Voice Mail</div>

        <div class="tabs">
            <a href="/" class="tab {% block signin_active %}{% endblock %}">Sign In</a>
            <a href="/register" class="tab {% block register_active %}{% endblock %}">Register</a>
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
